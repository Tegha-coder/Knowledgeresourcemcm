<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Thank you for contacting KnowledgeResource.">
    <title>Thank You | KnowledgeResource</title>
    <style>
        :root {
            --primary: #111827;
            --secondary: #1f2937;
            --accent: #d4af37;
            --light: #ffffff;
            --muted: #6b7280;
            --bg: #f8fafc;
            --border: #e5e7eb;
            --shadow: 0 12px 30px rgba(17, 24, 39, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(rgba(17, 24, 39, 0.88), rgba(17, 24, 39, 0.9)), url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: var(--light);
            padding: 24px;
        }

        .card {
            width: min(680px, 100%);
            background: rgba(17, 24, 39, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 34px;
            text-align: center;
        }

        .badge {
            display: inline-block;
            margin-bottom: 14px;
            color: var(--accent);
            font-weight: 700;
            letter-spacing: 1px;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 12px;
        }

        p {
            color: rgba(255, 255, 255, 0.88);
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 22px;
        }

        .btn {
            display: inline-block;
            padding: 12px 18px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--primary);
        }

        .btn-secondary {
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: var(--light);
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="badge">REQUEST SENT</div>
        <h1>Thank you for reaching out</h1>
        <p>Your quick request has been submitted to <strong>Knowledgeresourcemcm1@gmail.com</strong>.</p>
        <p>Someone can now review your message and follow up with you using the email you provided.</p>

        <div class="actions">
            <a class="btn btn-primary" href="index.html#contact">Send another request</a>
            <a class="btn btn-secondary" href="index.html">Back to homepage</a>
        </div>
    </main>
</body>
</html>
